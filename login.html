<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian SMPN 3 Watukumpul</title>
    <style>
        :root { --primary: #004080; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; }
        img.logo { width: 140px; margin-bottom: 15px; }
        h2 { font-size: 1.2rem; color: #333; margin-bottom: 25px; line-height: 1.5; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #002d5a; }
        .hidden { display: none; }
        #timer { position: fixed; top: 15px; right: 15px; background: #e74c3c; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; z-index: 1000; }
        iframe { width: 100%; height: 92vh; border: none; }
    </style>
</head>
<body>

    <!-- LOGIN PESERTA -->
    <div id="page-login" class="container">
        <div class="card">
            <img src="logo_smpn3.png" class="logo" alt="Logo SPENTIWA">
            <h2>ASESMEN SUMATIF AKHIR JENJANG<br>TAHUN 2025/2026<br>SMP NEGERI 3 WATUKUMPUL</h2>
            <input type="text" id="input-nama" placeholder="Nama Lengkap Siswa">
            <select id="select-kelas"><option value="">-- Pilih Kelas --</option></select>
            <button onclick="checkUser()">MASUK</button>
        </div>
    </div>

    <!-- VERIFIKASI TOKEN -->
    <div id="page-token" class="container hidden">
        <div class="card">
            <h3 id="info-mapel">Mata Pelajaran</h3>
            <p>Silahkan masukkan token dari pengawas</p>
            <input type="text" id="token-input" placeholder="TOKEN">
            <button onclick="startExam()">MULAI UJIAN SEKARANG</button>
        </div>
    </div>

    <!-- LAMAN UJIAN -->
    <div id="page-exam" class="hidden">
        <div id="timer">Waktu: <span id="time-left">00:00</span></div>
        <div style="background: var(--primary); color: white; padding: 12px; font-size: 0.9rem;">
            <b>SPENTIWA EXAM SYSTEM</b> | <span id="display-nama"></span>
        </div>
        <iframe id="exam-frame"></iframe>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('examData')) || { siswa: [] };

        // Load Kelas ke Dropdown
        window.onload = () => {
            const select = document.getElementById('select-kelas');
            const classes = [...new Set(config.siswa.map(s => s.kelas))];
            classes.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                select.appendChild(opt);
            });
        };

        function checkUser() {
            const nama = document.getElementById('input-nama').value;
            const kelas = document.getElementById('select-kelas').value;
            const userValid = config.siswa.find(s => s.nama.toLowerCase() === nama.toLowerCase() && s.kelas === kelas);

            if(userValid) {
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('page-token').classList.remove('hidden');
                document.getElementById('info-mapel').innerText = config.mapel;
                window.currentUser = nama;
            } else { alert("Nama/Kelas tidak ditemukan di database!"); }
        }

        function startExam() {
            const token = document.getElementById('token-input').value;
            if(token === config.token) {
                // Aktifkan Fullscreen
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();

                document.getElementById('page-token').classList.add('hidden');
                document.getElementById('page-exam').classList.remove('hidden');
                document.getElementById('exam-frame').src = config.link;
                document.getElementById('display-nama').innerText = window.currentUser + " (" + config.mapel + ")";

                runTimer(config.waktu * 60);
                lockSecurity();
            } else { alert("Token salah!"); }
        }

        function runTimer(sec) {
            const display = document.getElementById('time-left');
            const timer = setInterval(() => {
                let min = Math.floor(sec / 60);
                let s = sec % 60;
                display.innerText = `${min}:${s < 10 ? '0'+s : s}`;
                if (sec-- <= 0) {
                    clearInterval(timer);
                    alert("Waktu Habis!");
                    location.reload();
                }
            }, 1000);
        }

        function lockSecurity() {
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) alert("Peringatan! Jangan keluar dari aplikasi ujian.");
            });
            document.addEventListener('contextmenu', e => e.preventDefault());
        }
    </script>
</body>
</html>
