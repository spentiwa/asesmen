<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen SMPN 3 Watukumpul</title>
    <style>
        :root { --primary: #004080; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; }
        img.logo { width: 140px; margin-bottom: 15px; }
        h2 { font-size: 1.1rem; color: #333; margin-bottom: 25px; line-height: 1.5; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #002d5a; }
        .hidden { display: none; }
        #timer { position: fixed; top: 15px; right: 15px; background: #e74c3c; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; z-index: 1000; }
        iframe { width: 100%; height: 92vh; border: none; }
        .warning-text { color: #c0392b; font-size: 0.85rem; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN PESERTA -->
    <div id="page-login" class="container">
        <div class="card">
            <img src="logo_smpn3.png" class="logo" alt="Logo SPENTIWA">
            <h2>ASESMEN SUMATIF AKHIR JENJANG<br>SMP NEGERI 3 WATUKUMPUL<br>TAHUN AJARAN 2025/2026</h2>
            <input type="text" id="input-nama" placeholder="Nama Lengkap Siswa">
            <select id="select-kelas"><option value="">-- Pilih Kelas --</option></select>
            <button onclick="checkUser()">MASUK</button>
        </div>
    </div>

    <!-- VERIFIKASI TOKEN -->
    <div id="page-token" class="container hidden">
        <div class="card">
            <h3 id="info-mapel">Mata Pelajaran</h3>
            <p>Silahkan masukkan token dari pengawas</p>
            <input type="text" id="token-input" placeholder="TOKEN">
            <button onclick="startExam()">MULAI UJIAN SEKARANG</button>
            <p id="jadwal-info" style="font-weight: bold; color: var(--primary);"></p>
            <p class="warning-text">⚠️ Dilarang keluar aplikasi atau berpindah tab setelah ujian dimulai!</p>
        </div>
    </div>

    <!-- LAMAN UJIAN -->
    <div id="page-exam" class="hidden">
        <div id="timer">Sisa Waktu: <span id="time-left">00:00:00</span></div>
        <div style="background: var(--primary); color: white; padding: 12px; font-size: 0.9rem;">
            <b>SPENTIWA EXAM SYSTEM</b> | <span id="display-nama"></span>
        </div>
        <div id="frame-container">
            <iframe id="exam-frame" allow="camera; microphone; display-capture"></iframe>
        </div>
    </div>

    <script>
        // Data config utama
        let config = {
            mapel: "PABP",
            token: "LKJMNG",
            waktuMulai: "07:30:00",
            waktuSelesai: "09:30:00",
            link: "https://forms.gle/UnA1BNvBDichKn8v8",
            siswa: [{"nama": "AFANUL MUARIFIN", "kelas": "IX A"}, {"nama": "AKBAR SAPUTRA", "kelas": "IX A"}, {"nama": "ANNA RAHMAWATI", "kelas": "IX A"}, {"nama": "APRILIA RIGINA PUTRI", "kelas": "IX A"}, {"nama": "AZKA JULIANTO", "kelas": "IX A"}, {"nama": "BREFIT SAPUTRA", "kelas": "IX A"}, {"nama": "BUNGA FITRIANI", "kelas": "IX A"}, {"nama": "DEA BANATUL KHOERIYAH", "kelas": "IX A"}, {"nama": "DIAN DIANA", "kelas": "IX A"}, {"nama": "DIDI KHOSI'IN", "kelas": "IX A"}, {"nama": "EKA NOVIAN", "kelas": "IX A"}, {"nama": "INDRI NURFAIROH", "kelas": "IX A"}, {"nama": "JEFRI ISKANDAR", "kelas": "IX A"}, {"nama": "KANJAT MAOLANA", "kelas": "IX A"}, {"nama": "LAELA RAHMAWATI", "kelas": "IX A"}, {"nama": "MAESAROTUN KHASANAH", "kelas": "IX A"}, {"nama": "MUHAMAD DIKA PRANANDA", "kelas": "IX A"}, {"nama": "MUHAMAD FAHRI", "kelas": "IX A"}, {"nama": "MUHAMAD YANUAR ARSADANI", "kelas": "IX A"}, {"nama": "NAFA RAHMAWATI", "kelas": "IX A"}, {"nama": "NAZIL MUKHSININ", "kelas": "IX A"}, {"nama": "RAFA ALWY BAKHTIAR", "kelas": "IX A"}, {"nama": "RESTU ALFARO", "kelas": "IX A"}, {"nama": "RESTU GALIH STIAWAN", "kelas": "IX A"}, {"nama": "SANTI SULISTYAWATI", "kelas": "IX A"}, {"nama": "SELVIA YULIANA SARI", "kelas": "IX A"}, {"nama": "TIARA NOVITA", "kelas": "IX A"}, {"nama": "YENI ARYANTI", "kelas": "IX A"}, {"nama": "ADIT BAYU SETIAWAN", "kelas": "IX B"}, {"nama": "AKSANIA FITRI WULANDARI", "kelas": "IX B"}, {"nama": "ANEZKA NAYSA AQILA", "kelas": "IX B"}, {"nama": "ASIHATUL AFIDAH", "kelas": "IX B"}, {"nama": "BENING IQNA ASFIA", "kelas": "IX B"}, {"nama": "DEFI ANANTA", "kelas": "IX B"}, {"nama": "DONI SAPUTRA", "kelas": "IX B"}, {"nama": "ENJI ERIKA", "kelas": "IX B"}, {"nama": "FAHRUR ROZI", "kelas": "IX B"}, {"nama": "FARHAN MAULANA ILHAM", "kelas": "IX B"}, {"nama": "FARIZ QIA MAULANA", "kelas": "IX B"}, {"nama": "FEBRIYANI ULFAH", "kelas": "IX B"}, {"nama": "FITRI FAUZIAH", "kelas": "IX B"}, {"nama": "HANIFATUL KHASANAH", "kelas": "IX B"}, {"nama": "HELMI FAISAL PRASTIAWAN", "kelas": "IX B"}, {"nama": "IBNU ARIFKI", "kelas": "IX B"}, {"nama": "ILHAM MANGSUR SAPUTRA", "kelas": "IX B"}, {"nama": "ITALITA INDAH OKTAVIA", "kelas": "IX B"}, {"nama": "JAMILATUN NISA", "kelas": "IX B"}, {"nama": "JOVAN FAHREZA ALFARIZI", "kelas": "IX B"}, {"nama": "MARATU NIKMAH", "kelas": "IX B"}, {"nama": "MUHAMAD AKBAR KAROMI", "kelas": "IX B"}, {"nama": "MUHAMAD BINTANG SAPUTRA", "kelas": "IX B"}, {"nama": "MUHAMMAD ADNAN ARIA", "kelas": "IX B"}, {"nama": "NUR SALSABILA", "kelas": "IX B"}, {"nama": "THANIA NOFITA DAMAYANTI", "kelas": "IX B"}, {"nama": "VANIA LAELATUN NIZAR", "kelas": "IX B"}, {"nama": "YOANITA LARASATI", "kelas": "IX B"}, {"nama": "ABDUL RAFA", "kelas": "IX C"}, {"nama": "ALYA SHIVA", "kelas": "IX C"}, {"nama": "ANGGIE ANGGRAENI SAPUTRI", "kelas": "IX C"}, {"nama": "DECA VIO ANETA", "kelas": "IX C"}, {"nama": "DENO YOGA FIRMANSYAH", "kelas": "IX C"}, {"nama": "ERNI LESTARI", "kelas": "IX C"}, {"nama": "FIFI NUR HIDAYAH", "kelas": "IX C"}, {"nama": "FINDA HIKMA GUNA", "kelas": "IX C"}, {"nama": "JALU PANGGIH SETIABUDI", "kelas": "IX C"}, {"nama": "LAELATUL RIZKIYAH", "kelas": "IX C"}, {"nama": "LINDA SETIANINGSIH", "kelas": "IX C"}, {"nama": "MAHBU ALWAN", "kelas": "IX C"}, {"nama": "MEISYA NURAENI", "kelas": "IX C"}, {"nama": "MEYLINDA REFANI", "kelas": "IX C"}, {"nama": "MIFTAKHUL KHOERUL ANAM", "kelas": "IX C"}, {"nama": "NUR HALIMAH HOLIFATUNNISA", "kelas": "IX C"}, {"nama": "RELIYA", "kelas": "IX C"}, {"nama": "REZA MAULANA MALIK", "kelas": "IX C"}, {"nama": "SELVIA AYU WULANDARI", "kelas": "IX C"}, {"nama": "STANLEY QOLBY NOOR", "kelas": "IX C"}, {"nama": "SURURI MUSYAFA", "kelas": "IX C"}, {"nama": "SYAFA MAE AZKIA", "kelas": "IX C"}, {"nama": "TARMONO", "kelas": "IX C"}, {"nama": "VANESYA PUTRI", "kelas": "IX C"}, {"nama": "ZAHROTUNISA", "kelas": "IX C"}, {"nama": "ZIDAN ARIF FADHILLAH", "kelas": "IX C"}, {"nama": "ABBY ALFATAH", "kelas": "IX D"}, {"nama": "ABDUL AZIZ SETIAWAN", "kelas": "IX D"}, {"nama": "ADELYA ZUHROTUN NAFISA", "kelas": "IX D"}, {"nama": "AENA KHAKIM", "kelas": "IX D"}, {"nama": "ALMISA PUTRA", "kelas": "IX D"}, {"nama": "ATIFA ROFIKA HANA", "kelas": "IX D"}, {"nama": "FANAISA ZAHIRA", "kelas": "IX D"}, {"nama": "FIA SAFITRI", "kelas": "IX D"}, {"nama": "FIATUN NINGSIH", "kelas": "IX D"}, {"alt": "HELSI MAOLANA", "nama": "HELSI MAOLANA", "kelas": "IX D"}, {"nama": "HIMATUROHMAH", "kelas": "IX D"}, {"nama": "IKFI SABILA KHOERIYAH", "kelas": "IX D"}, {"nama": "IKFINA ROCHMATIN", "kelas": "IX D"}, {"nama": "INA SELVIANA", "kelas": "IX D"}, {"nama": "KODIMAN", "kelas": "IX D"}, {"nama": "MAESAROH", "kelas": "IX D"}, {"nama": "MUHAMAD BAYU LAELATUL FIKRI", "kelas": "IX D"}, {"nama": "MUHAMAD DAVAN ZAKARIA", "kelas": "IX D"}, {"nama": "MUHAMAD IRFAN", "kelas": "IX D"}, {"nama": "NADIYA", "kelas": "IX D"}, {"nama": "NAJWA PUTRI AZZAHRA", "kelas": "IX D"}, {"nama": "NELIN", "kelas": "IX D"}, {"nama": "NUR AENI", "kelas": "IX D"}, {"nama": "NURUL HUMAM", "kelas": "IX D"}, {"nama": "RAFA SAPUTRA", "kelas": "IX D"}, {"nama": "ROBANA MAULANA", "kelas": "IX D"}, {"nama": "TEGUH SATRIO", "kelas": "IX D"}, {"nama": "UNZILA RIZQIKA", "kelas": "IX D"}]
        };

        window.onload = () => {
            const select = document.getElementById('select-kelas');
            const classes = [...new Set(config.siswa.map(s => s.kelas))];
            classes.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                select.appendChild(opt);
            });
        };

        function checkUser() {
            const nama = document.getElementById('input-nama').value.trim().toUpperCase();
            const kelas = document.getElementById('select-kelas').value;
            const userValid = config.siswa.find(s => s.nama.toUpperCase() === nama && s.kelas === kelas);

            if(userValid) {
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('page-token').classList.remove('hidden');
                document.getElementById('info-mapel').innerText = config.mapel;
                document.getElementById('jadwal-info').innerText = `Jadwal: ${config.waktuMulai.substring(0,5)} - ${config.waktuSelesai.substring(0,5)} WIB`;
                window.currentUser = nama;
            } else { alert("Nama/Kelas tidak ditemukan!"); }
        }

        function startExam() {
            const token = document.getElementById('token-input').value;
            const sekarang = new Date();
            const jamMulai = new Date();
            const jamSelesai = new Date();
            
            const [hM, mM, sM] = config.waktuMulai.split(':');
            const [hS, mS, sS] = config.waktuSelesai.split(':');
            
            jamMulai.setHours(hM, mM, sM);
            jamSelesai.setHours(hS, mS, sS);

            if (sekarang < jamMulai) {
                alert("Ujian belum dimulai! Tunggu hingga " + config.waktuMulai);
                return;
            }
            if (sekarang > jamSelesai) {
                alert("Waktu ujian sudah berakhir!");
                return;
            }

            if(token === config.token) {
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

                document.getElementById('page-token').classList.add('hidden');
                document.getElementById('page-exam').classList.remove('hidden');
                document.getElementById('exam-frame').src = config.link;
                document.getElementById('display-nama').innerText = window.currentUser + " (" + config.mapel + ")";

                runTimerRealTime(jamSelesai);
                
                // Beri jeda 2 detik sebelum mengaktifkan kunci keamanan agar transisi fullscreen stabil
                setTimeout(lockSecurity, 2000);
            } else { alert("Token salah!"); }
        }

        function runTimerRealTime(targetTime) {
            const display = document.getElementById('time-left');
            window.examTimer = setInterval(() => {
                const sekarang = new Date();
                const selisih = targetTime - sekarang;
                if (selisih <= 0) {
                    clearInterval(window.examTimer);
                    terminateExam("Waktu ujian telah habis!");
                } else {
                    let h = Math.floor((selisih / (1000 * 60 * 60)) % 24);
                    let m = Math.floor((selisih / (1000 * 60)) % 60);
                    let s = Math.floor((selisih / 1000) % 60);
                    display.innerText = `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                }
            }, 1000);
        }

        function lockSecurity() {
            // Mencegah klik kanan
            document.addEventListener('contextmenu', e => e.preventDefault());

            // HANYA MENDETEKSI JIKA PINDAH TAB ATAU MINIMIZE
            // Menggunakan visibilityState jauh lebih akurat daripada onblur untuk Google Form
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    terminateExam("PELANGGARAN: Anda terdeteksi meninggalkan layar ujian!");
                }
            });

            // Mencegah shortcut keyboard (F12, Ctrl+Shift+I, dll)
            document.onkeydown = (e) => {
                if (
                    e.key === "F12" || 
                    (e.ctrlKey && (e.key === "u" || e.key === "U" || e.key === "s" || e.key === "S")) ||
                    (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C"))
                ) {
                    e.preventDefault();
                    return false;
                }
            };
        }

        function terminateExam(msg) {
            if(window.examTimer) clearInterval(window.examTimer);
            document.getElementById('frame-container').innerHTML = "";
            alert(msg);
            document.getElementById('page-exam').innerHTML = `
                <div class="container">
                    <div class="card">
                        <h2 style="color:red;">UJIAN BERAKHIR</h2>
                        <p>${msg}</p>
                        <p>Jika ini adalah kesalahan teknis, hubungi pengawas.</p>
                        <button onclick="location.reload()">KEMBALI KE LOGIN</button>
                    </div>
                </div>`;
            if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
